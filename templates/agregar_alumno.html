<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Alumno</title>
    <!-- Incluye aquí tu CDN de Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Registrar Nuevo Alumno</h2>
        <form action="{{ url_for('agregar_alumno') }}" method="POST">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>
            <div class="mb-3">
                <label for="nro_lista" class="form-label">Número de Lista</label>
                <input type="number" class="form-control" id="nro_lista" name="nro_lista" required>
            </div>
            <div class="mb-3">
                <label for="id_curso" class="form-label">Curso</label>
                <select class="form-select" id="id_curso" name="id_curso" required>
                    {% for curso in cursos %}
                        <option value="{{ curso.id_curso }}">{{ curso.nombre_curso }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Guardar Alumno</button>
        </form>
    </div>
</body>
</html>

{% extends 'base.html' %}

{% block title %}Editar Alumno{% endblock %}

{% block content %}
<form method="POST">
    <!-- Campo para editar el Nombre -->
    <div class="mb-3">
        <label class="form-label">Nombre del Alumno:</label>
        <input type="text" name="nombre" class="form-control" value="{{ alumno.nombre }}" required>
    </div>

    <!-- Campo para editar el Número de Lista -->
    <div class="mb-3">
        <label class="form-label">Número de Lista:</label>
        <input type="number" name="nro_lista" class="form-control" value="{{ alumno.nro_lista }}" required>
    </div>

    <!-- Campo para editar el Curso -->
    <div class="mb-3">
        <label class="form-label">Curso:</label>
        <select name="id_curso" class="form-select" required>
            {% for curso in cursos %}
            <option value="{{ curso.id_curso }}" {% if curso.id_curso == alumno.curso %}selected{% endif %}>
                {{ curso.nombre_curso }}
            </option>
            {% endfor %}
        </select>
    </div>
     <button type="submit" class="btn btn-primary">Guardar Cambios</button>
    <a href="{{ url_for('admin_alumnos') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}

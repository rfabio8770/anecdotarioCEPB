<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Registro Anecdótico{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <header class="bg-primary text-white py-3">
        <div class="container d-flex align-items-center">
            <!-- Logo - Asegúrate de tener tu imagen en static/images/logo.png -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="width: 50px;" class="me-3">
            <h1 class="h3 mb-0">Registro Anecdótico</h1>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_cursos')}}">Curso</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_alumnos')}}">Alumnos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Anecdotario</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Anotaciones</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}
        <!-- Aquí se insertará el contenido de las otras páginas -->
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

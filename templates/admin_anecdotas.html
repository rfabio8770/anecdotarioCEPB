{% extends 'base.html' %}

{% block title %}Inicio - Agregar Tipo de Anecdota{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 shadow-sm">
    <form method="POST" class="mb-4">
    <div class="mb-3">
        <input type="text" name="descripcion" class="form-control" placeholder="Nueva categoría (ej. Felicitación, Observación)" required>
    </div>
    <button type="submit" class="btn btn-success">Agregar Tipo</button>
</form>

<table class="table">
    {% for item in tipos %}
    <tr>
        <td>{{ item.descripcion }}</td>
        <td>
            <a href="{{ url_for('editar_anecdota', id=item.id_anecdota) }}" class="btn btn-warning btn-sm">Editar</a>
            <a href="{{ url_for('eliminar_anecdota', id=item.id_anecdota) }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Seguro?')">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>
</div>
{% endblock %}

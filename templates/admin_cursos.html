{% extends 'base.html' %}

{% block title %}Gestionar Cursos{% endblock %}

{% block content %}
<div class="container mt-4">
<h2>Gestión de Cursos</h2>
    
    <form method="POST" class="mb-4 row g-3">
        <div class="col-auto">
            <input type="text" name="nombre_curso" class="form-control" placeholder="Nombre del nuevo curso" required>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-success">Agregar Curso</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for curso in cursos %}
            <tr>
                <td>{{ curso.id_curso }}</td>
                <td>{{ curso.nombre_curso }}</td>
                <!-- Dentro del bucle for en admin_cursos.html -->
                <td>
                    <a href="{{ url_for('editar_curso', id=curso.id_curso) }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{{ url_for('eliminar_curso', id=curso.id_curso) }}" class="btn btn-danger btn-sm" 
                    onclick="return confirm('¿Estás seguro?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

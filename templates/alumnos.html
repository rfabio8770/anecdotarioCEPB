<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alumnos de {{ curso.nombre_curso }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Lista de Alumnos - {{ curso.nombre_curso }}</h2>
        <table class="table table-striped mt-4">
            <thead>
                <tr>
                    <th>Nro. Lista</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for alumno in alumnos %}
                <tr>
                    <td>{{ alumno.nro_lista }}</td>
                    <td>{{ alumno.nombre }}</td>
                    <td>
                        <!-- Botón que abrirá el formulario de anotación -->
                        <a href="{{ url_for('vista_agregar_anotacion', id_alumno=alumno.id) }}" class="btn btn-sm btn-info">Realizar Anotación</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Volver a Cursos</a>
    </div>
</body>
</html>

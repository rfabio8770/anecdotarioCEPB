<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Seleccionar Curso para Anotaciones</h2>
        <div class="list-group mt-4">
            {% for curso in cursos %}
                <a href="{{ url_for('listar_alumnos', id_curso=curso.id_curso) }}" class="list-group-item list-group-item-action">
                    {{ curso.nombre_curso }}
                </a>
            {% endfor %}
        </div>
        <hr>
        <a href="{{ url_for('agregar_alumno') }}" class="btn btn-secondary">Ir a Registrar Alumno</a>
    </div>
</body>
</html>
